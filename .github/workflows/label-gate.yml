name: PR Label Gate

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:
    inputs:
      pull_number:
        description: Pull request number to evaluate
        required: false
        type: number

concurrency:
  group: label-gate-${{ github.event.pull_request.number || github.event.inputs.pull_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  label-gate:
    name: PR Label Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted metadata helpers
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.merge_group.base_ref || github.sha || format('refs/heads/{0}', github.event.repository.default_branch) }}
          sparse-checkout: |
            .github/scripts

      - name: Validate PR intent labels
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_PULL_NUMBER: ${{ github.event.inputs.pull_number || '' }}
        run: |
          set -euo pipefail
          python3 ./.github/scripts/metadata_gate.py label
