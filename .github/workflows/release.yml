name: Release

on:
  workflow_run:
    workflows:
      - CI Main
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA on main to release or backfill
        required: true
        type: string

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64
  RELEASE_SNAPSHOT_NOTES_REF: refs/notes/release-snapshots

jobs:
  release-meta:
    name: Release Meta (snapshot + tags)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    permissions:
      actions: read
      contents: read
    outputs:
      target_sha: ${{ steps.pending-target.outputs.target_sha }}
      blocked_count: ${{ steps.pending-target.outputs.blocked_count }}
      blocked_targets_csv: ${{ steps.pending-target.outputs.blocked_targets_csv }}
      release_enabled: ${{ steps.snapshot.outputs.release_enabled }}
      release_bump: ${{ steps.snapshot.outputs.release_bump }}
      release_channel: ${{ steps.snapshot.outputs.release_channel }}
      pr_number: ${{ steps.snapshot.outputs.pr_number }}
      pr_title: ${{ steps.snapshot.outputs.pr_title }}
      image_name_lower: ${{ steps.snapshot.outputs.image_name_lower }}
      app_effective_version: ${{ steps.snapshot.outputs.app_effective_version }}
      release_tag: ${{ steps.snapshot.outputs.release_tag }}
      release_prerelease: ${{ steps.snapshot.outputs.release_prerelease }}
      tags_csv: ${{ steps.snapshot.outputs.tags_csv }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git identity for release notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve requested commit
        id: requested-target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target_sha="${{ inputs.commit_sha }}"
          else
            target_sha="${{ github.event.workflow_run.head_sha }}"
          fi

          if [[ ! "${target_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid commit_sha: ${target_sha}" >&2
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git cat-file -e "${target_sha}^{commit}" 2>/dev/null; then
            git fetch --no-tags origin "${target_sha}"
          fi
          git cat-file -e "${target_sha}^{commit}"

          if ! git merge-base --is-ancestor "${target_sha}" origin/main; then
            echo "Commit ${target_sha} is not contained in origin/main" >&2
            exit 1
          fi

          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_REQUESTED_SHA=${target_sha}"

      - name: Validate manual backfill target passed CI
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.requested-target.outputs.target_sha }}
        with:
          script: |
            const { owner, repo } = context.repo
            const sha = process.env.TARGET_SHA
            const workflows = ['ci-main.yml', 'ci.yml']

            const hasAcceptedRun = async (workflowId) => {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                branch: 'main',
                event: 'push',
                head_sha: sha,
                status: 'completed',
                per_page: 100,
              })
              return (runs.data.workflow_runs || []).some(run => run.head_sha === sha && run.conclusion === 'success')
            }

            for (const workflowId of workflows) {
              try {
                if (await hasAcceptedRun(workflowId)) {
                  core.notice(`Accepted ${workflowId} history for ${sha}`)
                  return
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error
                }
              }
            }

            core.setFailed(`Manual backfill requires a successful CI Main or legacy CI Pipeline push run for ${sha}`)

      - name: Ensure immutable release snapshot for manual backfill
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.requested-target.outputs.target_sha }}
        run: |
          set -euo pipefail
          python3 .github/scripts/release_snapshot.py ensure \
            --target-sha "${TARGET_SHA}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --github-token "${GITHUB_TOKEN}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --registry "${REGISTRY}" \
            --snapshot-source manual-backfill \
            --legacy-default-channel stable \
            --target-only \
            --output "$RUNNER_TEMP/release-snapshot.json"

      - name: Select pending release target
        id: pending-target
        shell: bash
        env:
          REQUESTED_SHA: ${{ steps.requested-target.outputs.target_sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target_sha=${REQUESTED_SHA}" >> "${GITHUB_OUTPUT}"
            echo "blocked_count=0" >> "${GITHUB_OUTPUT}"
            echo "blocked_targets_csv=" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_TARGET_SHA=${REQUESTED_SHA}"
            exit 0
          fi

          git fetch --no-tags origin main
          git fetch --tags origin
          git fetch --no-tags origin "+${RELEASE_SNAPSHOT_NOTES_REF}:${RELEASE_SNAPSHOT_NOTES_REF}" || true
          next_pending_args=(
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}"
            --main-ref "origin/main"
            --upper-bound "${REQUESTED_SHA}"
            --github-output "$GITHUB_OUTPUT"
            --allow-workflow-changing-targets
          )
          python3 .github/scripts/release_snapshot.py next-pending \
            "${next_pending_args[@]}"
          resolved_target_sha="$(grep '^target_sha=' "${GITHUB_OUTPUT}" | tail -n1 | cut -d= -f2- || true)"
          if [[ -n "${resolved_target_sha}" ]]; then
            echo "RELEASE_TARGET_SHA=${resolved_target_sha}"
          fi

      - name: Summarize pending release selection
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        env:
          REQUESTED_SHA: ${{ steps.requested-target.outputs.target_sha }}
          TARGET_SHA: ${{ steps.pending-target.outputs.target_sha }}
          BLOCKED_COUNT: ${{ steps.pending-target.outputs.blocked_count }}
          BLOCKED_TARGETS_CSV: ${{ steps.pending-target.outputs.blocked_targets_csv }}
        run: |
          set -euo pipefail
          if [[ -n "${TARGET_SHA}" ]]; then
            echo "Selected oldest pending release target ${TARGET_SHA}"
          else
            echo "Release queue is empty up to ${REQUESTED_SHA}"
          fi

          {
            echo "### Release queue selection"
            echo "- requested upper bound: ${REQUESTED_SHA}"
            echo "- selected target: ${TARGET_SHA:-"(none)"}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Load immutable release snapshot
        if: steps.pending-target.outputs.target_sha != ''
        id: snapshot
        shell: bash
        env:
          TARGET_SHA: ${{ steps.pending-target.outputs.target_sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            git fetch --no-tags origin "+${RELEASE_SNAPSHOT_NOTES_REF}:${RELEASE_SNAPSHOT_NOTES_REF}" || true
          fi
          python3 .github/scripts/release_snapshot.py export \
            --target-sha "${TARGET_SHA}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --main-ref "origin/main" \
            --resolve-publication-tags \
            --github-output "$GITHUB_OUTPUT"

  release-publish:
    name: Release Publish (tag/assets/image)
    runs-on: ubuntu-latest
    needs: [release-meta]
    if: needs.release-meta.outputs.target_sha != '' && needs.release-meta.outputs.release_enabled == 'true'
    permissions:
      actions: write
      contents: write
      issues: write
      packages: write
      pull-requests: write
    env:
      RELEASE_TOOLING_ROOT: ${{ github.workspace }}/.release-tooling
      CATNAP_DOCKER_BINARY_SOURCE_ROOT: ${{ github.workspace }}/target
      CATNAP_DOCKER_BINARY_OUTPUT_ROOT: ${{ github.workspace }}/dist/docker
    timeout-minutes: 180
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-meta.outputs.target_sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Checkout release tooling
        uses: actions/checkout@v6
        with:
          path: .release-tooling
          ref: ${{ github.workflow_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Configure git identity for release notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve GitHub release auth token
        id: release-auth
        shell: bash
        env:
          RELEASE_WORKFLOW_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${RELEASE_WORKFLOW_TOKEN}" ]]; then
            {
              echo "token<<__CODEX__"
              echo "${RELEASE_WORKFLOW_TOKEN}"
              echo "__CODEX__"
              echo "auth_mode=release_workflow_token"
            } >> "${GITHUB_OUTPUT}"
            echo "Using workflow-capable release token override."
            exit 0
          fi

          {
            echo "token<<__CODEX__"
            echo "${GITHUB_TOKEN_FALLBACK}"
            echo "__CODEX__"
            echo "auth_mode=github_token"
          } >> "${GITHUB_OUTPUT}"
          echo "Using default GITHUB_TOKEN for release API calls."

      - name: Resolve release carrier strategy
        id: release-plan
        shell: bash
        env:
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
          RELEASE_AUTH_MODE: ${{ steps.release-auth.outputs.auth_mode }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          main_head_sha="$(git rev-parse origin/main)"

          if [[ "${RELEASE_AUTH_MODE}" == "release_workflow_token" ]]; then
            echo "candidate_release_target_sha=${TARGET_SHA}" >> "${GITHUB_OUTPUT}"
            echo "candidate_release_carrier_sha=${TARGET_SHA}" >> "${GITHUB_OUTPUT}"
            echo "Using workflow-capable release token override; release tag can target the snapshot commit directly."
            exit 0
          fi

          if git diff-tree --no-commit-id --name-only -r "${main_head_sha}" | grep -Eq '^\.github/workflows/'; then
            echo "Current default branch head ${main_head_sha} changes .github/workflows/**." >&2
            echo "Default GITHUB_TOKEN cannot create release tags from this head." >&2
            echo "Merge a later non-workflow commit on main, or configure RELEASE_WORKFLOW_TOKEN, before backfilling." >&2
            exit 1
          fi

          echo "candidate_release_target_sha=" >> "${GITHUB_OUTPUT}"
          echo "candidate_release_carrier_sha=${main_head_sha}" >> "${GITHUB_OUTPUT}"
          if [[ "${main_head_sha}" == "${TARGET_SHA}" ]]; then
            echo "Using default-branch release creation; current main head already matches the snapshot commit."
          else
            echo "Historical snapshot ${TARGET_SHA} will be reissued via current main head ${main_head_sha}."
          fi

      - name: Probe workflow-commit tag permission
        if: steps.release-plan.outputs.candidate_release_target_sha != ''
        shell: bash
        env:
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
          RELEASE_PUBLISH_TOKEN: ${{ steps.release-auth.outputs.token }}
        run: |
          set -euo pipefail
          if ! git diff-tree --no-commit-id --name-only -r "${TARGET_SHA}" | grep -Eq '^\.github/workflows/'; then
            exit 0
          fi

          probe_tag="__release_probe_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          auth_header="$(printf 'x-access-token:%s' "${RELEASE_PUBLISH_TOKEN}" | base64 | tr -d '\n')"

          cleanup() {
            git tag -d "${probe_tag}" >/dev/null 2>&1 || true
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
              push origin ":refs/tags/${probe_tag}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          git tag "${probe_tag}" "${TARGET_SHA}"
          if ! git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "refs/tags/${probe_tag}:refs/tags/${probe_tag}"; then
            echo "Configured RELEASE_WORKFLOW_TOKEN still cannot tag workflow-changing commit ${TARGET_SHA}." >&2
            echo "Provide a token with workflows permission or create tag ${probe_tag} manually to verify access." >&2
            exit 1
          fi

      - name: Build web (optional, for embedded UI)
        if: hashFiles('web/package.json') != ''
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1

      - name: Install web dependencies and build
        if: hashFiles('web/package.json') != ''
        shell: bash
        run: |
          set -euo pipefail
          cd web
          bun install --frozen-lockfile
          VITE_APP_VERSION="${{ needs.release-meta.outputs.app_effective_version }}" bun run build

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build release assets (linux/amd64+arm64, gnu+musl)
        shell: bash
        env:
          APP_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.app_effective_version }}
        run: |
          set -euo pipefail

          cat > Cross.toml <<'CROSS'
          [target.x86_64-unknown-linux-gnu]
          pre-build = [
            "dpkg_arch=${CROSS_DEB_ARCH#musl-linux-} && dpkg --add-architecture ${dpkg_arch}",
            "apt-get update && apt-get install --assume-yes --no-install-recommends pkg-config perl libssl-dev:${dpkg_arch}"
          ]

          [target.aarch64-unknown-linux-gnu]
          pre-build = [
            "dpkg_arch=${CROSS_DEB_ARCH#musl-linux-} && dpkg --add-architecture ${dpkg_arch}",
            "apt-get update && apt-get install --assume-yes --no-install-recommends pkg-config perl libssl-dev:amd64 libssl-dev:${dpkg_arch}"
          ]

          [target.x86_64-unknown-linux-musl]
          pre-build = [
            "dpkg_arch=${CROSS_DEB_ARCH#musl-linux-} && dpkg --add-architecture ${dpkg_arch}",
            "apt-get update && apt-get install --assume-yes --no-install-recommends pkg-config perl libssl-dev:${dpkg_arch}"
          ]

          [target.aarch64-unknown-linux-musl]
          pre-build = [
            "dpkg_arch=${CROSS_DEB_ARCH#musl-linux-} && dpkg --add-architecture ${dpkg_arch}",
            "apt-get update && apt-get install --assume-yes --no-install-recommends pkg-config perl libssl-dev:amd64 libssl-dev:${dpkg_arch}"
          ]
          CROSS

          cargo install cross --locked

          out_dir="dist/release-assets"
          rm -rf "${out_dir}"
          mkdir -p "${out_dir}"

          build_one() {
            local target="$1"
            local arch="$2"
            local abi="$3"

            rm -rf target/release
            cross build --release --locked --target "${target}"

            local bin="target/${target}/release/catnap"
            if [[ ! -f "${bin}" ]]; then
              echo "missing binary: ${bin}" >&2
              exit 1
            fi

            local base="catnap_${APP_EFFECTIVE_VERSION}_linux_${arch}_${abi}"
            local tgz="${out_dir}/${base}.tar.gz"
            tar -C "$(dirname "${bin}")" -czf "${tgz}" catnap
            sha256sum "${tgz}" | awk '{print $1}' > "${tgz}.sha256"
          }

          build_one x86_64-unknown-linux-gnu amd64 gnu
          build_one aarch64-unknown-linux-gnu arm64 gnu
          build_one x86_64-unknown-linux-musl amd64 musl
          build_one aarch64-unknown-linux-musl arm64 musl

      - name: Smoke test (linux/amd64 gnu binary)
        shell: bash
        env:
          APP_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.app_effective_version }}
        run: |
          bash "${RELEASE_TOOLING_ROOT}/.github/scripts/smoke-test.sh" ./target/x86_64-unknown-linux-gnu/release/catnap

      - name: Prepare Docker runtime binaries
        shell: bash
        run: |
          set -euo pipefail
          bash "${RELEASE_TOOLING_ROOT}/.github/scripts/prepare-docker-binaries.sh"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker-push
        uses: docker/build-push-action@v6
        with:
          context: ./dist/docker
          file: ./dist/docker/Dockerfile.release
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ needs.release-meta.outputs.tags_csv }}
          labels: |
            org.opencontainers.image.version=${{ needs.release-meta.outputs.app_effective_version }}
            org.opencontainers.image.revision=${{ needs.release-meta.outputs.target_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ needs.release-meta.outputs.app_effective_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed manifest platforms
        shell: bash
        env:
          TAGS_CSV: ${{ needs.release-meta.outputs.tags_csv }}
          REQUIRED_PLATFORMS: ${{ env.PLATFORMS }}
        run: |
          set -euo pipefail
          IFS=',' read -r -a tags <<< "${TAGS_CSV}"
          for tag in "${tags[@]}"; do
            [[ -z "${tag}" ]] && continue
            raw_json="$(docker buildx imagetools inspect "${tag}" --raw)"
            RAW_JSON="${raw_json}" python3 "${RELEASE_TOOLING_ROOT}/.github/scripts/verify_manifest_platforms.py" "${tag}"
          done

      - name: Ensure release tag exists on release carrier
        id: ensure_release_tag
        shell: bash
        env:
          RELEASE_PUBLISH_TOKEN: ${{ steps.release-auth.outputs.token }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
          CANDIDATE_RELEASE_TARGET_SHA: ${{ steps.release-plan.outputs.candidate_release_target_sha }}
          CANDIDATE_RELEASE_CARRIER_SHA: ${{ steps.release-plan.outputs.candidate_release_carrier_sha }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          plan_file="${RUNNER_TEMP}/release-tag-plan.env"
          python3 "${RELEASE_TOOLING_ROOT}/.github/scripts/resolve_release_tag.py" \
            --release-tag "${RELEASE_TAG}" \
            --target-sha "${TARGET_SHA}" \
            --candidate-release-target-sha "${CANDIDATE_RELEASE_TARGET_SHA}" \
            --candidate-release-carrier-sha "${CANDIDATE_RELEASE_CARRIER_SHA}" \
            --github-output "${plan_file}"
          cat "${plan_file}" >> "${GITHUB_OUTPUT}"
          # shellcheck disable=SC1090
          source "${plan_file}"

          if [[ "${release_create_mode}" != "precreated_tag" ]]; then
            exit 0
          fi

          # actions/checkout leaves a GitHub auth header in local config; clear it so
          # the workflow token can supply the only Authorization header for the tag push.
          git config --local --unset-all http.https://github.com/.extraheader || true
          auth_header="$(printf 'x-access-token:%s' "${RELEASE_PUBLISH_TOKEN}" | base64 | tr -d '\n')"
          git tag -f "${RELEASE_TAG}" "${TARGET_SHA}"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          git fetch --tags origin

      - name: Prepare GitHub Release body
        id: release-body
        shell: bash
        env:
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
          RELEASE_TAG_SHA: ${{ steps.ensure_release_tag.outputs.resolved_release_tag_sha }}
          RELEASE_CHANNEL: ${{ needs.release-meta.outputs.release_channel }}
          RELEASE_PR_NUMBER: ${{ needs.release-meta.outputs.pr_number }}
        run: |
          set -euo pipefail
          if [[ "${RELEASE_TAG_SHA}" == "${TARGET_SHA}" ]]; then
            echo "body_file=" >> "${GITHUB_OUTPUT}"
            echo "generate_release_notes=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          body_file="${RUNNER_TEMP}/github-release-body.md"
          {
            echo "Backfilled from immutable snapshot [\`${TARGET_SHA}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${TARGET_SHA})."
            echo
            echo "Source snapshot commit: [\`${TARGET_SHA}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${TARGET_SHA})"
            echo "Release tag carrier commit: [\`${RELEASE_TAG_SHA}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${RELEASE_TAG_SHA})"
            echo "Channel: \`${RELEASE_CHANNEL}\`"
            if [[ -n "${RELEASE_PR_NUMBER}" ]]; then
              echo "Original PR: #${RELEASE_PR_NUMBER}"
            fi
            echo
            echo "This GitHub Release was reissued without \`RELEASE_WORKFLOW_TOKEN\`."
            echo "The release tag points to the non-workflow carrier commit above, while the attached binaries and published container image were built from the source snapshot commit."
          } > "${body_file}"

          echo "body_file=${body_file}" >> "${GITHUB_OUTPUT}"
          echo "generate_release_notes=false" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub Release and upload assets
        shell: bash
        env:
          RELEASE_PUBLISH_TOKEN: ${{ steps.release-auth.outputs.token }}
          RELEASE_CREATE_MODE: ${{ steps.ensure_release_tag.outputs.release_create_mode }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          RELEASE_PRERELEASE: ${{ needs.release-meta.outputs.release_prerelease }}
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
          RELEASE_BODY_FILE: ${{ steps.release-body.outputs.body_file }}
          GENERATE_RELEASE_NOTES: ${{ steps.release-body.outputs.generate_release_notes }}
        run: |
          set -euo pipefail
          release_args=(
            --repository "${GITHUB_REPOSITORY}"
            --token "${RELEASE_PUBLISH_TOKEN}"
            --tag "${RELEASE_TAG}"
            --name "${RELEASE_TAG}"
            --prerelease "${RELEASE_PRERELEASE}"
            --generate-release-notes "${GENERATE_RELEASE_NOTES}"
            --artifacts-dir dist/release-assets
          )
          if [[ -n "${RELEASE_BODY_FILE}" ]]; then
            release_args+=(--body-file "${RELEASE_BODY_FILE}")
          fi
          if [[ "${RELEASE_CREATE_MODE}" == "api_target_sha" ]]; then
            release_args+=(--target-sha "${TARGET_SHA}")
          fi
          python3 "${RELEASE_TOOLING_ROOT}/.github/scripts/publish_github_release.py" "${release_args[@]}"

      - name: Verify release tag points to resolved carrier commit
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          RELEASE_TAG_SHA: ${{ steps.ensure_release_tag.outputs.resolved_release_tag_sha }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          actual="$(git rev-list -n 1 "${RELEASE_TAG}")"
          if [[ "${actual}" != "${RELEASE_TAG_SHA}" ]]; then
            echo "Release tag ${RELEASE_TAG} points to ${actual} (expected ${RELEASE_TAG_SHA})" >&2
            exit 1
          fi

      - name: Upsert PR release version comment
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
          RELEASE_TAG_SHA: ${{ steps.ensure_release_tag.outputs.resolved_release_tag_sha }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          APP_EFFECTIVE_VERSION: ${{ needs.release-meta.outputs.app_effective_version }}
          RELEASE_PR_NUMBER: ${{ needs.release-meta.outputs.pr_number }}
          RELEASE_CHANNEL: ${{ needs.release-meta.outputs.release_channel }}
        with:
          github-token: ${{ steps.release-auth.outputs.token }}
          script: |
            const { owner, repo } = context.repo
            const marker = '<!-- codex-release-version-comment -->'
            const rawPrNumber = process.env.RELEASE_PR_NUMBER
            const releaseTag = process.env.RELEASE_TAG
            const appVersion = process.env.APP_EFFECTIVE_VERSION
            const releaseChannel = process.env.RELEASE_CHANNEL || '(unknown)'
            const targetSha = process.env.TARGET_SHA || '(unknown)'
            const releaseTagSha = process.env.RELEASE_TAG_SHA || targetSha
            const issueNumber = Number(rawPrNumber)

            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.notice('No PR number available for release comment; skipping.')
              return
            }
            if (!releaseTag || !appVersion) {
              core.notice('Missing release tag or app version; skipping PR release comment.')
              return
            }

            const releaseUrl = `https://github.com/${owner}/${repo}/releases/tag/${releaseTag}`
            const body = [
              marker,
              `Released in [\`${releaseTag}\`](${releaseUrl})`,
              `Version: \`${appVersion}\``,
              `Channel: \`${releaseChannel}\``,
            ].join('\n')
            const lines = body.split('\n')
            lines.push(`Snapshot commit: \`${targetSha}\``)
            if (releaseTagSha !== targetSha) {
              lines.push(`Release tag carrier: \`${releaseTagSha}\``)
              lines.push('Publish mode: `reissued`')
            } else {
              lines.push(`Commit: \`${targetSha}\``)
            }
            const renderedBody = lines.join('\n')

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              })
              const foreignMarkerComment = comments.find(comment =>
                typeof comment.body === 'string' &&
                comment.body.includes(marker) &&
                (comment.user?.type !== 'Bot' || comment.user?.login !== 'github-actions[bot]')
              )
              if (foreignMarkerComment) {
                throw new Error(`Marker comment already owned by ${foreignMarkerComment.user?.login || 'unknown'} (#${foreignMarkerComment.id})`)
              }

              const existing = comments.find(comment =>
                typeof comment.body === 'string' &&
                comment.body.includes(marker) &&
                comment.user?.type === 'Bot' &&
                comment.user?.login === 'github-actions[bot]'
              )

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: renderedBody,
                })
                core.notice(`Updated PR #${issueNumber} release version comment for ${releaseTag}`)
                return
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: renderedBody,
              })
              core.notice(`Created PR #${issueNumber} release version comment for ${releaseTag}`)
            } catch (error) {
              const acceptedPermissions = error.response?.headers?.['x-accepted-github-permissions'] || '(not provided)'
              const status = error.status || error.response?.status || '(unknown)'
              core.error(`Failed to upsert PR release version comment: ${error.message} (status=${status}, accepted_permissions=${acceptedPermissions})`)
              throw error
            }

      - name: Mark snapshot published
        shell: bash
        env:
          RELEASE_PUBLISH_TOKEN: ${{ steps.release-auth.outputs.token }}
          TARGET_SHA: ${{ needs.release-meta.outputs.target_sha }}
          RELEASE_TAG_SHA: ${{ steps.ensure_release_tag.outputs.resolved_release_tag_sha }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "${RELEASE_PUBLISH_TOKEN}" | base64 | tr -d '\n')"
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
          trap 'git config --local --unset-all http.https://github.com/.extraheader || true' EXIT
          git fetch --no-tags origin "+${RELEASE_SNAPSHOT_NOTES_REF}:${RELEASE_SNAPSHOT_NOTES_REF}" || true
          published_mode="direct"
          if [[ "${RELEASE_TAG_SHA}" != "${TARGET_SHA}" ]]; then
            published_mode="reissued"
          fi
          python3 "${RELEASE_TOOLING_ROOT}/.github/scripts/release_snapshot.py" mark-published \
            --target-sha "${TARGET_SHA}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --release-tag-sha "${RELEASE_TAG_SHA}" \
            --published-mode "${published_mode}"

      - name: Resolve next pending release target
        if: github.event_name != 'workflow_dispatch'
        id: next-pending
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git fetch --tags origin
          git fetch --no-tags origin "+${RELEASE_SNAPSHOT_NOTES_REF}:${RELEASE_SNAPSHOT_NOTES_REF}" || true
          next_pending_args=(
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}"
            --main-ref "origin/main"
            --upper-bound "$(git rev-parse origin/main)"
            --github-output "$GITHUB_OUTPUT"
            --allow-workflow-changing-targets
          )
          python3 "${RELEASE_TOOLING_ROOT}/.github/scripts/release_snapshot.py" next-pending \
            "${next_pending_args[@]}"

      - name: Continue release queue
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          NEXT_TARGET_SHA: ${{ steps.next-pending.outputs.target_sha }}
        with:
          script: |
            const { owner, repo } = context.repo
            const nextSha = process.env.NEXT_TARGET_SHA
            if (!nextSha) {
              core.notice('Release queue is empty.')
              return
            }

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: { commit_sha: nextSha },
            })
            core.notice(`Queued next release target ${nextSha}`)
