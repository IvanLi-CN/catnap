name: Release Pipeline

on:
  workflow_run:
    workflows:
      - Main CI
    types:
      - completed

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    name: Release Plan
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      has_releases: ${{ steps.plan.outputs.has_releases }}
      release_count: ${{ steps.plan.outputs.release_count }}
      release_matrix: ${{ steps.plan.outputs.release_matrix }}
      release_plan: ${{ steps.plan.outputs.release_plan }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
    steps:
      - name: Checkout target history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve target metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          git fetch --no-tags --depth=1 origin main
          current_main_sha="$(git rev-parse FETCH_HEAD)"
          run_attempt='${{ github.event.workflow_run.run_attempt || 1 }}'
          should_publish="true"
          if [[ "${target_sha}" != "${current_main_sha}" ]]; then
            should_publish="false"
          fi
          if [[ "${run_attempt}" != "1" ]]; then
            should_publish="false"
          fi
          {
            echo "target_sha=${target_sha}"
            echo "current_main_sha=${current_main_sha}"
            echo "run_attempt=${run_attempt}"
            echo "should_publish=${should_publish}"
          } >> "${GITHUB_OUTPUT}"

      - name: Plan missing releases
        if: steps.meta.outputs.should_publish == 'true'
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python3 ./.github/scripts/release_plan.py plan \
            --repo "${GITHUB_REPOSITORY}" \
            --repo-root "$PWD" \
            --target-sha "${{ steps.meta.outputs.target_sha }}" \
            --target-ref "main" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Summary
        if: always()
        env:
          RELEASE_PLAN_JSON: ${{ steps.plan.outputs.release_plan || '{}' }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          plan = json.loads(os.environ.get("RELEASE_PLAN_JSON") or "{}")
          lines = [
              "### Release reconciliation",
              f"- workflow_run_id: ${{ github.event.workflow_run.id }}",
              f"- target_sha: ${{ steps.meta.outputs.target_sha }}",
              f"- current_main_sha: ${{ steps.meta.outputs.current_main_sha }}",
              f"- run_attempt: ${{ steps.meta.outputs.run_attempt }}",
              f"- should_publish: ${{ steps.meta.outputs.should_publish }}",
              f"- release_count: ${{ steps.plan.outputs.release_count || '0' }}",
              "- plan:",
              "```json",
              json.dumps(plan, indent=2, sort_keys=True),
              "```",
          ]
          with summary.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

  publish:
    name: Release Publish (${{ matrix.tag }})
    if: needs.plan.outputs.should_publish == 'true' && needs.plan.outputs.has_releases == 'true'
    needs: [plan]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.plan.outputs.release_matrix) }}
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v6

      - name: Publish candidate
        uses: ./.github/actions/release-publish
        with:
          target-ref: ${{ matrix.commit_sha }}
          target-sha: ${{ matrix.commit_sha }}
          support-ref: main
          release-tag: ${{ matrix.tag }}
          release-version: ${{ matrix.version }}
          release-app-version: ${{ matrix.app_version }}
          prerelease: ${{ matrix.prerelease && 'true' || 'false' }}
          publish-latest: ${{ matrix.publish_latest && 'true' || 'false' }}
