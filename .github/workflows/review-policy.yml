name: Review Policy

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed
      - edited
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:
    inputs:
      pull_number:
        description: Pull request number to evaluate
        required: true
        type: number

concurrency:
  group: review-policy-${{ github.event.pull_request.number || github.event.inputs.pull_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  review-policy:
    name: Review Policy Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted metadata helpers
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.merge_group.base_ref || format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Evaluate review policy
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_PULL_NUMBER: ${{ github.event.inputs.pull_number || '' }}
        run: |
          set -euo pipefail
          python3 ./.github/scripts/metadata_gate.py review
