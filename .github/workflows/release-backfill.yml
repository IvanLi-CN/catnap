name: Release Backfill

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semver tag to publish (vX.Y.Z)
        required: true

concurrency:
  group: release-backfill-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: catnap
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  release:
    name: Release (backfill)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Validate input tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid tag (expected vX.Y.Z): ${tag}" >&2
            exit 1
          fi

          echo "APP_EFFECTIVE_VERSION=${tag#v}" >> "${GITHUB_ENV}"

      - name: Checkout (full history, tag)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.tag }}

      - name: Checkout workflow support files
        uses: actions/checkout@v6
        with:
          path: .ci-support
          ref: main

      - name: Set up Bun (optional)
        if: hashFiles('web/package.json') != ''
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1

      - name: Build web (optional, for embedded UI)
        if: hashFiles('web/package.json') != ''
        shell: bash
        run: |
          set -euo pipefail
          cd web
          bun install --frozen-lockfile
          VITE_APP_VERSION="${APP_EFFECTIVE_VERSION}" bun run build

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Ensure vendored OpenSSL for linux targets (compat, old tags)
        shell: bash
        run: |
          set -euo pipefail

          changed="false"

          if ! grep -q "target\\.'cfg(target_env = \\\"musl\\\")'\\.dependencies" Cargo.toml; then
            cat >> Cargo.toml <<'EOF'

          [target.'cfg(target_env = "musl")'.dependencies]
          openssl = { version = "0.10", features = ["vendored"] }
          EOF

            changed="true"
          fi

          if ! grep -q "target\\.'cfg(all(target_os = \\\"linux\\\", target_env = \\\"gnu\\\"))'\\.dependencies" Cargo.toml; then
            cat >> Cargo.toml <<'EOF'

          [target.'cfg(all(target_os = "linux", target_env = "gnu"))'.dependencies]
          openssl = { version = "0.10", features = ["vendored"] }
          EOF

            changed="true"
          fi

          if [[ "${changed}" == "false" ]]; then
            echo "vendored OpenSSL already configured"
            exit 0
          fi

          CARGO_TARGET_DIR=target/host cargo check

      - name: Build release assets (linux/amd64+arm64, gnu+musl)
        shell: bash
        run: |
          set -euo pipefail

          cat > Cross.toml <<'EOF'
          [target.x86_64-unknown-linux-gnu]
          pre-build = [
            "dpkg_arch=${CROSS_DEB_ARCH#musl-linux-} && dpkg --add-architecture ${dpkg_arch}",
            "apt-get update && apt-get install --assume-yes --no-install-recommends pkg-config perl libssl-dev:${dpkg_arch}"
          ]

          [target.aarch64-unknown-linux-gnu]
          pre-build = [
            "dpkg_arch=${CROSS_DEB_ARCH#musl-linux-} && dpkg --add-architecture ${dpkg_arch}",
            "apt-get update && apt-get install --assume-yes --no-install-recommends pkg-config perl libssl-dev:amd64 libssl-dev:${dpkg_arch}"
          ]

          [target.x86_64-unknown-linux-musl]
          pre-build = [
            "dpkg_arch=${CROSS_DEB_ARCH#musl-linux-} && dpkg --add-architecture ${dpkg_arch}",
            "apt-get update && apt-get install --assume-yes --no-install-recommends pkg-config perl libssl-dev:${dpkg_arch}"
          ]

          [target.aarch64-unknown-linux-musl]
          pre-build = [
            "dpkg_arch=${CROSS_DEB_ARCH#musl-linux-} && dpkg --add-architecture ${dpkg_arch}",
            "apt-get update && apt-get install --assume-yes --no-install-recommends pkg-config perl libssl-dev:amd64 libssl-dev:${dpkg_arch}"
          ]
          EOF

          cargo install cross --locked

          out_dir="dist/release-assets"
          rm -rf "${out_dir}"
          mkdir -p "${out_dir}"

          build_one() {
            local target="$1"
            local arch="$2"
            local abi="$3"

            rm -rf target/release
            cross build --release --locked --target "${target}"

            local bin="target/${target}/release/catnap"
            if [[ ! -f "${bin}" ]]; then
              echo "missing binary: ${bin}" >&2
              exit 1
            fi

            local base="catnap_${APP_EFFECTIVE_VERSION}_linux_${arch}_${abi}"
            local tgz="${out_dir}/${base}.tar.gz"
            tar -C "$(dirname "${bin}")" -czf "${tgz}" catnap
            sha256sum "${tgz}" | awk '{print $1}' > "${tgz}.sha256"
          }

          build_one x86_64-unknown-linux-gnu amd64 gnu
          build_one aarch64-unknown-linux-gnu arm64 gnu
          build_one x86_64-unknown-linux-musl amd64 musl
          build_one aarch64-unknown-linux-musl arm64 musl

      - name: Smoke test (linux/amd64 gnu binary)
        shell: bash
        run: |
          bash ./.github/scripts/smoke-test.sh ./target/x86_64-unknown-linux-gnu/release/catnap

      - name: Prepare Docker runtime binaries
        shell: bash
        run: |
          set -euo pipefail
          CATNAP_DOCKER_BINARY_SOURCE_ROOT="$PWD/target" \
          CATNAP_DOCKER_BINARY_OUTPUT_ROOT="$PWD/dist/docker" \
            bash ./.ci-support/.github/scripts/prepare-docker-binaries.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image-tags
        shell: bash
        run: |
          set -euo pipefail

          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${owner_lower}/${IMAGE_REPO}"
          current_tag="${{ inputs.tag }}"
          highest_stable_tag="$(
            git tag -l \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n1 || true
          )"
          if [[ -z "${highest_stable_tag}" ]]; then
            echo "failed to resolve highest stable tag for latest policy" >&2
            exit 1
          fi

          publish_latest="false"
          if [[ "${current_tag}" == "${highest_stable_tag}" ]]; then
            publish_latest="true"
          fi

          {
            echo "image=${image}"
            echo "current_tag=${current_tag}"
            echo "highest_stable_tag=${highest_stable_tag}"
            echo "publish_latest=${publish_latest}"
            echo "tags<<EOF"
            echo "${image}:${current_tag}"
            if [[ "${publish_latest}" == "true" ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        id: docker-push
        uses: docker/build-push-action@v6
        continue-on-error: true
        with:
          context: ./dist/docker
          file: ./dist/docker/Dockerfile.release
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ env.APP_EFFECTIVE_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ env.APP_EFFECTIVE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Warn on Docker cache export failure (retrying without cache-to)
        if: steps.docker-push.outcome == 'failure'
        shell: bash
        run: |
          echo "WARN: Docker push step failed with GHA cache enabled; retrying without cache-to. If the retry succeeds, this is treated as a cache export/transient issue; real build errors must still fail the job." >&2

      - name: Build and push Docker image (fallback without cache-to)
        if: steps.docker-push.outcome == 'failure'
        id: docker-push-fallback
        uses: docker/build-push-action@v6
        with:
          context: ./dist/docker
          file: ./dist/docker/Dockerfile.release
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ env.APP_EFFECTIVE_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ env.APP_EFFECTIVE_VERSION }}
          cache-from: type=gha

      - name: Verify docker push gate (must pass before release publish)
        shell: bash
        run: |
          set -euo pipefail
          primary_outcome="${{ steps.docker-push.outcome }}"
          fallback_conclusion="${{ steps.docker-push-fallback.conclusion || 'skipped' }}"
          current_tag="${{ inputs.tag }}"
          highest_stable_tag="${{ steps.image-tags.outputs.highest_stable_tag }}"
          publish_latest="${{ steps.image-tags.outputs.publish_latest }}"

          release_gate_passed="false"
          if [[ "${primary_outcome}" == "success" ]]; then
            release_gate_passed="true"
          elif [[ "${primary_outcome}" == "failure" && "${fallback_conclusion}" == "success" ]]; then
            release_gate_passed="true"
          fi

          {
            echo "### Release publish gate"
            echo "- current_tag: ${current_tag}"
            echo "- highest_stable_tag: ${highest_stable_tag}"
            echo "- publish_latest: ${publish_latest}"
            echo "- docker_primary_outcome: ${primary_outcome}"
            echo "- docker_fallback_conclusion: ${fallback_conclusion}"
            echo "- release_gate_passed: ${release_gate_passed}"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${release_gate_passed}" != "true" ]]; then
            echo "Docker image push did not complete successfully; blocking release publish." >&2
            exit 1
          fi

      - name: Create/Update GitHub Release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          generateReleaseNotes: true
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: dist/release-assets/*
          artifactErrorsFailBuild: true
          replacesArtifacts: true
