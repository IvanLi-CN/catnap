name: Release Reconcile

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or commit SHA to reconcile up to
        required: true
        type: string
      legacy_missing_channel:
        description: How to classify historical merged PRs without channel labels
        required: false
        default: stable
        type: choice
        options:
          - stable
          - error

concurrency:
  group: release-reconcile-${{ inputs.target_ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    name: Release Plan (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      has_releases: ${{ steps.plan.outputs.has_releases }}
      release_count: ${{ steps.plan.outputs.release_count }}
      release_matrix: ${{ steps.plan.outputs.release_matrix }}
      release_plan: ${{ steps.plan.outputs.release_plan }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
    steps:
      - name: Checkout target history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.target_ref }}

      - name: Resolve target metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "target_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Plan missing releases
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REF: ${{ inputs.target_ref }}
          TARGET_SHA: ${{ steps.meta.outputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail
          plan_json="$(python3 ./.github/scripts/release_plan.py plan \
            --repo "${GITHUB_REPOSITORY}" \
            --repo-root "$PWD" \
            --target-sha "${TARGET_SHA}" \
            --target-ref "${TARGET_REF}" \
            --allow-tag-repair \
            --legacy-missing-channel "${{ inputs.legacy_missing_channel }}")"
          PLAN_JSON="${plan_json}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          plan = json.loads(os.environ["PLAN_JSON"])

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"has_releases={'true' if plan['entries'] else 'false'}\n")
              handle.write(f"release_count={plan['release_count']}\n")
              handle.write("release_matrix<<EOF\n")
              handle.write(json.dumps({"include": plan["entries"]}, separators=(",", ":")) + "\n")
              handle.write("EOF\n")
              handle.write("release_plan<<EOF\n")
              handle.write(json.dumps(plan, separators=(",", ":")) + "\n")
              handle.write("EOF\n")
          PY

      - name: Summary
        if: always()
        env:
          RELEASE_PLAN_JSON: ${{ steps.plan.outputs.release_plan || '{}' }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          plan = json.loads(os.environ.get("RELEASE_PLAN_JSON") or "{}")
          lines = [
              "### Manual release reconciliation",
              f"- target_ref: ${{ inputs.target_ref }}",
              f"- target_sha: ${{ steps.meta.outputs.target_sha }}",
              f"- release_count: ${{ steps.plan.outputs.release_count || '0' }}",
              "- plan:",
              "```json",
              json.dumps(plan, indent=2, sort_keys=True),
              "```",
          ]
          with summary.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

  publish:
    name: Release Publish (${{ matrix.tag }})
    if: needs.plan.outputs.has_releases == 'true'
    needs: [plan]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.plan.outputs.release_matrix) }}
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v6

      - name: Publish candidate
        uses: ./.github/actions/release-publish
        with:
          target-ref: ${{ matrix.commit_sha }}
          target-sha: ${{ matrix.commit_sha }}
          support-ref: main
          release-tag: ${{ matrix.tag }}
          release-version: ${{ matrix.version }}
          release-app-version: ${{ matrix.app_version }}
          prerelease: ${{ matrix.prerelease && 'true' || 'false' }}
          publish-latest: ${{ matrix.publish_latest && 'true' || 'false' }}
